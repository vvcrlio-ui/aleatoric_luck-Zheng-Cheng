model_params: model_params.yaml
preset: medium

panels:
  - name: smr_hourlywage
    data: data/asample2_withlag.csv
    dataset: asample2_withlag
    outcome: Cm_lhourlywage
    task: regression
    models:
      - ols
      - ridge
      - lasso
      - elastic_net
      - random_forest
      - xgboost
      - lightgbm
      - shallow_neural_network
      - extra_trees
      - super_learner
      # - bart # legacy replication model; too heavy to run locally
    out: outputs/nk_grid_smr_hourlywage.csv

  - name: smr_totalincome
    data: data/asample2_withlag.csv
    dataset: asample2_withlag
    outcome: Cm_ltotalincome
    task: regression
    models:
      - ols
      - ridge
      - lasso
      - elastic_net
      - random_forest
      - xgboost
      - lightgbm
      - shallow_neural_network
      - extra_trees
      - super_learner
      # - bart # legacy replication model; too heavy to run locally
    out: outputs/nk_grid_smr_totalincome.csv

